version: "3.9"

services:
  campus-hive:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - db_data:/app/backend/db.sqlite3
      - static_files:/app/backend/staticfiles
    environment:
      - DJANGO_SETTINGS_MODULE=campus_hive.settings
      - DJANGO_DEBUG=False
      - SECRET_KEY=${SECRET_KEY:-campus-hive-super-secret-jwt-key-2024-change-in-prod}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - CORS_ORIGINS=http://localhost:8000,http://localhost:5173
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./frontend/dist:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - campus-hive
    restart: unless-stopped

volumes:
  db_data:
  static_files:
