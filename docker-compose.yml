version: "3.9"

services:
  backend:
    build: ./backend
    container_name: campushive-backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      - DJANGO_SETTINGS_MODULE=campus_hive.settings
      - DJANGO_DEBUG=False
    volumes:
      - backend-data:/app/db.sqlite3
    restart: unless-stopped
    command: >
      sh -c "python manage.py migrate --noinput 2>/dev/null || true &&
             gunicorn campus_hive.wsgi:application --bind 0.0.0.0:8000 --workers 3 --timeout 120"

  frontend:
    build: ./frontend
    container_name: campushive-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  backend-data:
