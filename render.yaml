# ============================================
# Campus Hive — Render.com Deployment Config
# ============================================
# Backend API only (frontend deployed on Vercel)
# Database: Neon PostgreSQL (always-on, auto-wake)

services:
  - type: web
    name: campus-hive-api
    runtime: docker
    dockerfilePath: ./Dockerfile.backend
    dockerContext: .
    plan: free
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: campus_hive.settings
      - key: DJANGO_DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        sync: false  # Set in Render dashboard: Neon PostgreSQL URL
      - key: GEMINI_API_KEY
        sync: false  # Set in Render dashboard
      - key: CORS_ORIGINS
        value: "*"
