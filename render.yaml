# ============================================
# Campus Hive — Render.com Deployment Config
# ============================================
# Single service: Django serves both API + React frontend
# Free tier compatible

services:
  - type: web
    name: campus-hive
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: campus_hive.settings
      - key: DJANGO_DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        sync: false  # Set manually in Render dashboard (Supabase URL or leave empty for SQLite)
      - key: GEMINI_API_KEY
        sync: false  # Set manually in Render dashboard
      - key: CORS_ORIGINS
        value: "*"
